<!DOCTYPE html>
<html>
<head>
    <title>Coco AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>

    <h1>Coco AI Vision</h1>

    <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <p id="status-text">Click to start</p>

    <div class="button-row">
        <button id="reset-btn" class="secondary-btn">RESET</button>
        <button id="action-btn">START</button>
        <button id="history-btn" class="secondary-btn">HISTORY</button>
    </div>

    <ul id="objects-list"></ul>

    <script src="script.js"></script>
</body>
</html>
